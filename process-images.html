<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Remover</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #1a2980;
            color: white;
        }
        h1 { text-align: center; color: #ff9800; }
        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .image-box {
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        canvas {
            border: 2px solid #4CAF50;
            background:
                linear-gradient(45deg, #ccc 25%, transparent 25%),
                linear-gradient(-45deg, #ccc 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #ccc 75%),
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        button {
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover { transform: scale(1.05); }
        .download-link {
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🐵 Image Background Remover 🦛</h1>
    <p style="text-align: center;">This tool will process monkey.png and hippo.png to create transparent background versions</p>

    <div class="container">
        <div class="image-box">
            <h3>Original Monkey</h3>
            <canvas id="monkeyOriginal" width="200" height="200"></canvas>
        </div>
        <div class="image-box">
            <h3>Processed Monkey (Transparent)</h3>
            <canvas id="monkeyProcessed" width="200" height="200"></canvas>
            <a id="downloadMonkey" class="download-link" download="monkey.png">⬇️ Download</a>
        </div>
    </div>

    <div class="container">
        <div class="image-box">
            <h3>Original Hippo</h3>
            <canvas id="hippoOriginal" width="200" height="200"></canvas>
        </div>
        <div class="image-box">
            <h3>Processed Hippo (Transparent)</h3>
            <canvas id="hippoProcessed" width="200" height="200"></canvas>
            <a id="downloadHippo" class="download-link" download="hippo.png">⬇️ Download</a>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <button onclick="processImages()">🔄 Process Images</button>
    </div>

    <script>
        let monkeyImg, hippoImg;

        function loadImage(src, canvasId) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.getElementById(canvasId);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(img);
                };
                img.onerror = reject;
                img.src = src;
            });
        }

        function removeBackground(sourceCanvas, targetCanvasId, colorThreshold = 200) {
            const sourceCtx = sourceCanvas.getContext('2d');
            const targetCanvas = document.getElementById(targetCanvasId);
            const targetCtx = targetCanvas.getContext('2d');

            const imageData = sourceCtx.getImageData(0, 0, sourceCanvas.width, sourceCanvas.height);
            const data = imageData.data;

            // Get the most common color (assumed to be background)
            const colorCount = {};
            for (let i = 0; i < data.length; i += 4) {
                const key = `${data[i]},${data[i+1]},${data[i+2]}`;
                colorCount[key] = (colorCount[key] || 0) + 1;
            }

            // Find dominant color
            let maxCount = 0;
            let bgColor = [255, 255, 255];
            for (const [color, count] of Object.entries(colorCount)) {
                if (count > maxCount && count > 100) {
                    maxCount = count;
                    bgColor = color.split(',').map(Number);
                }
            }

            // Make similar colors transparent
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // Check if color is close to background color
                const diff = Math.abs(r - bgColor[0]) + Math.abs(g - bgColor[1]) + Math.abs(b - bgColor[2]);
                if (diff < 80) {
                    data[i + 3] = 0; // Make transparent
                }
            }

            targetCtx.putImageData(imageData, 0, 0);

            // Create download link
            const downloadLink = targetCanvasId.includes('monkey') ?
                document.getElementById('downloadMonkey') :
                document.getElementById('downloadHippo');
            downloadLink.href = targetCanvas.toDataURL('image/png');
        }

        async function processImages() {
            try {
                // Load original images
                await loadImage('images/monkey.png', 'monkeyOriginal');
                await loadImage('images/hippo.png', 'hippoOriginal');

                // Process images (remove background)
                setTimeout(() => {
                    const monkeyOriginal = document.getElementById('monkeyOriginal');
                    const hippoOriginal = document.getElementById('hippoOriginal');

                    removeBackground(monkeyOriginal, 'monkeyProcessed');
                    removeBackground(hippoOriginal, 'hippoProcessed');

                    alert('✅ Images processed successfully! Click the download buttons to save the transparent versions.');
                }, 500);
            } catch (error) {
                console.error('Error loading images:', error);
                alert('Error loading images. Make sure the images are in the images/ folder.');
            }
        }

        // Auto-process on page load
        window.onload = processImages;
    </script>
</body>
</html>
